  # --- Everything below is OFF the VPN (normal bridge) ---

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
    container_name: flaresolverr
    shm_size: "2gb"
    environment:
      - LOG_LEVEL=info
    restart: always
    networks: [arrnet]
    ports:
      - 8191:8191

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest@sha256:4fd7a166c8f46dd3370a871c250ee577d6c2ae97a0dbe0e3614b5ef736205620
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - prowlarr_config:/config
    restart: always
    networks: [arrnet]
    ports:
      - 9696:9696

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest@sha256:24acea2956a0ccb11f103877d9f4f8576600fb34bff34820ed749c2256dab89f
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - sonarr_config:/config
      - /volume1/data:/data
    restart: always
    networks: [arrnet]
    ports:
      - 8989:8989

  whisparr:
    image: ghcr.io/thespad/whisparr:latest@sha256:351eab59ee4a66c217d7f5004da53857012291b543a0f4767c14a505a76f3fda
    container_name: whisparr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - whisparr_config:/config
      - /volume1/data:/data
    restart: always
    networks: [arrnet]
    ports:
      - 6969:6969

  radarr:
    image: lscr.io/linuxserver/radarr:latest@sha256:e35056574cdc695a9ee745aa1ecda9eab3842450bf4b7b8471b023790fa3861d
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - radarr_config:/config
      - /volume1/data:/data
    restart: always
    networks: [arrnet]
    ports:
      - 7878:7878

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest@sha256:4c30dc0bb9a5d223075e7f5d12c77bd293c4b460f86d696dbe64763104c1e88c
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - bazarr_config:/config
      - /volume1/data/media:/data/media
    restart: unless-stopped
    networks: [arrnet]
    ports:
      - 6767:6767

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest@sha256:53a1b839ffa81f139e1552840772bff8a5d13f5c78a69cce22458b9a6cd0844d
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - overseerr_config:/config
    restart: unless-stopped
    networks: [arrnet]
    ports:
      - 5055:5055

  heimdall:
    image: lscr.io/linuxserver/heimdall:latest@sha256:c829ee25e075cf125241edd3ae5ca8d63f8e98f1f207d829ce787665ad98f008
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - heimdall_config:/config
    restart: unless-stopped
    networks: [arrnet]
    ports:
      - 8083:80
      - 8443:443

  rclone-seedbox-pull:
    image: rclone/rclone:latest@sha256:c61954aaa32328a5486715dd063a81c7879f5195ad3505cd362deddd509dc4a1
    container_name: rclone-seedbox-pull
    user: "1000:1000"
    restart: unless-stopped
    environment:
      - TZ=Europe/Stockholm
      - RCLONE_CONFIG=/dev/null
      - RCLONE_CONFIG_SEEDBOX_TYPE=sftp
      - RCLONE_CONFIG_SEEDBOX_HOST=137.ftl11.seedit4.me
      - RCLONE_CONFIG_SEEDBOX_PORT=2113
      - RCLONE_CONFIG_SEEDBOX_USER=seedit4me
      - RCLONE_CONFIG_SEEDBOX_PASS=${RCLONE_SEEDBOX_OBSCURED_PASS}
    volumes:
      - /volume1/data:/data
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while :; do
          rclone copy "seedbox:/home/seedit4me/torrents/qbittorrent" "/data/seedbox-sync/qbittorrent" \
            --transfers=4 --checkers=8 --fast-list \
            --exclude="**/*.!qB" --exclude="**/.unwanted/**" --min-age 5m --max-age 180h \
            --copy-links --create-empty-src-dirs \
            --use-json-log --log-level=INFO --stats=30s;
          sleep 300;
        done
    networks: [arrnet]

  unpackerr:
    image: golift/unpackerr:latest@sha256:4ec141eeb0cb2f971d7c92f21cc40b0d2d50d7920eb7a0557443cca52270c0b0
    container_name: unpackerr
    user: "1000:1000"
    environment:
      - TZ=Europe/Stockholm
      # Update to service names (no more 127.0.0.1)
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_WHISPARR_0_URL=http://whisparr:6969
      - UN_WHISPARR_0_API_KEY=${WHISPARR_API_KEY}
      - UN_SONARR_0_DELETE_ORIG=false
      - UN_RADARR_0_DELETE_ORIG=false
      - UN_WHISPARR_0_DELETE_ORIG=false
      - UN_FOLDER_0_PATH=/data/torrents
      - UN_FOLDER_0_EXTRACT_PATH=/data/torrents
      - UN_FOLDER_0_DELETE_AFTER=96h
      - UN_FOLDER_1_PATH=/data/seedbox-sync/qbittorrent
      - UN_FOLDER_1_EXTRACT_PATH=/data/seedbox-sync/qbittorrent
      - UN_FOLDER_1_DELETE_AFTER=96h
      - UN_LOG_LEVEL=INFO
    volumes:
      - /volume1/data:/data
    restart: unless-stopped
    networks: [arrnet]
    depends_on:
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
      whisparr:
        condition: service_started

  plex:
    image: plexinc/pms-docker@sha256:a2b03d75aa16f422488c692935cab476d966b75f2af3c93bb6d910c6051906f5
    container_name: plex
    environment:
      - TZ=Europe/Stockholm
      - VERSION=docker
      - HOSTNAME=PlexServer
      - PLEX_UID=1000
      - PLEX_GID=1000
    volumes:
      - plex_config:/config
      - /volume1/data/media:/data/media
    network_mode: host
    privileged: true
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: home-nas
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./tailscale-state:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    restart: unless-stopped
    network_mode: host
    privileged: true

volumes:
  prowlarr_config:
  sonarr_config:
  radarr_config:
  whisparr_config:
  qbittorrent_config:
  heimdall_config:
  plex_config:
  overseerr_config:
  bazarr_config:

networks:
  arrnet:
    driver: bridge
