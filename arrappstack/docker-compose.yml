  # --- Everything below is OFF the VPN (normal bridge) ---

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
    container_name: flaresolverr
    shm_size: "2gb"
    environment:
      - LOG_LEVEL=info
    restart: always
    networks: [arrnet]
    ports:
      - 8191:8191

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest@sha256:e74a1e093dcc223d671d4b7061e2b4946f1989a4d3059654ff4e623b731c9134
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - prowlarr_config:/config
    restart: always
    networks: [arrnet]
    ports:
      - 9696:9696

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest@sha256:37be832b78548e3f55f69c45b50e3b14d18df1b6def2a4994258217e67efb1a1
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - sonarr_config:/config
      - /volume1/data:/data
    restart: always
    networks: [arrnet]
    ports:
      - 8989:8989

  whisparr:
    image: ghcr.io/thespad/whisparr:latest@sha256:d53ed73f7404e87843f9e935ecfeca7d7119348dad87c52b6e66910f73437619
    container_name: whisparr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - whisparr_config:/config
      - /volume1/data:/data
    restart: always
    networks: [arrnet]
    ports:
      - 6969:6969

  radarr:
    image: lscr.io/linuxserver/radarr:latest@sha256:f08dda38e7d12e5a722d9a5cb6e54acaf63c8598fefeefec88effe0c0d0038dd
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - radarr_config:/config
      - /volume1/data:/data
    restart: always
    networks: [arrnet]
    ports:
      - 7878:7878

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest@sha256:4c30dc0bb9a5d223075e7f5d12c77bd293c4b460f86d696dbe64763104c1e88c
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - bazarr_config:/config
      - /volume1/data/media:/data/media
    restart: unless-stopped
    networks: [arrnet]
    ports:
      - 6767:6767

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest@sha256:b21e06654f321a94778ea314f693a4b1c073d99ef36881c7f493e2afc6c08b20
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - overseerr_config:/config
    restart: unless-stopped
    networks: [arrnet]
    ports:
      - 5055:5055

  heimdall:
    image: lscr.io/linuxserver/heimdall:latest@sha256:adb467b90b825f44d7e4c1764191f4fa0a7c38cff6ff050407f7aeb3514bdbe1
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    volumes:
      - heimdall_config:/config
    restart: unless-stopped
    networks: [arrnet]
    ports:
      - 8083:80
      - 8443:443

  rclone-seedbox-pull:
    image: rclone/rclone:latest@sha256:9f59fda717a48aced38d7f27e9ec8fd9992b5651e7a03897bebf204d3a9197d6
    container_name: rclone-seedbox-pull
    user: "1000:1000"
    restart: unless-stopped
    environment:
      - TZ=Europe/Stockholm
      - RCLONE_CONFIG=/dev/null
      - RCLONE_CONFIG_SEEDBOX_TYPE=sftp
      - RCLONE_CONFIG_SEEDBOX_HOST=137.ftl11.seedit4.me
      - RCLONE_CONFIG_SEEDBOX_PORT=2113
      - RCLONE_CONFIG_SEEDBOX_USER=seedit4me
      - RCLONE_CONFIG_SEEDBOX_PASS=${RCLONE_SEEDBOX_OBSCURED_PASS}
    volumes:
      - /volume1/data:/data
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while :; do
          rclone copy "seedbox:/home/seedit4me/torrents/qbittorrent" "/data/seedbox-sync/qbittorrent" \
            --transfers=4 --checkers=8 --fast-list \
            --exclude="**/*.!qB" --exclude="**/.unwanted/**" --min-age 5m --max-age 180h \
            --copy-links --create-empty-src-dirs \
            --use-json-log --log-level=INFO --stats=30s;
          sleep 300;
        done
    networks: [arrnet]

  unpackerr:
    image: golift/unpackerr:latest@sha256:a9e7eb0d7b0ca16d2bdcb5af52eb4b544053ad6d915dd9b0f8383bc83f1df5cc
    container_name: unpackerr
    user: "1000:1000"
    environment:
      - TZ=Europe/Stockholm
      # Update to service names (no more 127.0.0.1)
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_WHISPARR_0_URL=http://whisparr:6969
      - UN_WHISPARR_0_API_KEY=${WHISPARR_API_KEY}
      - UN_SONARR_0_DELETE_ORIG=false
      - UN_RADARR_0_DELETE_ORIG=false
      - UN_WHISPARR_0_DELETE_ORIG=false
      - UN_FOLDER_0_PATH=/data/torrents
      - UN_FOLDER_0_EXTRACT_PATH=/data/torrents
      - UN_FOLDER_0_DELETE_AFTER=96h
      - UN_FOLDER_1_PATH=/data/seedbox-sync/qbittorrent
      - UN_FOLDER_1_EXTRACT_PATH=/data/seedbox-sync/qbittorrent
      - UN_FOLDER_1_DELETE_AFTER=96h
      - UN_LOG_LEVEL=INFO
    volumes:
      - /volume1/data:/data
    restart: unless-stopped
    networks: [arrnet]
    depends_on:
      sonarr:
        condition: service_started
      radarr:
        condition: service_started
      whisparr:
        condition: service_started

  plex:
    image: plexinc/pms-docker@sha256:1131c4cd21fa22f8196f749f1dbb69af306776c3c83c7f5b061e51dc49bcff7f
    container_name: plex
    environment:
      - TZ=Europe/Stockholm
      - VERSION=docker
      - HOSTNAME=PlexServer
      - PLEX_UID=1000
      - PLEX_GID=1000
    volumes:
      - plex_config:/config
      - /volume1/data/media:/data/media
    network_mode: host
    privileged: true
    restart: unless-stopped

volumes:
  prowlarr_config:
  sonarr_config:
  radarr_config:
  whisparr_config:
  qbittorrent_config:
  heimdall_config:
  plex_config:
  overseerr_config:
  bazarr_config:

networks:
  arrnet:
    driver: bridge
